<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>连英翻译 - 设置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <header class="header">
      <div class="logo">
        <span class="logo-text">连英翻译</span>
      </div>
      <button id="themeToggle" class="theme-toggle" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </header>

    <div class="form-group">
      <div class="label-row">
        <label for="apiProvider">API 提供商</label>
        <span class="badge" id="poweredBadge">AI Powered</span>
      </div>
      <select id="apiProvider">
        <!-- Dynamically generated by popup.js -->
      </select>
    </div>

    <div class="form-group">
      <label for="model">模型 (Model)</label>
      <select id="model">
        <!-- Dynamically loaded by popup.js -->
      </select>
    </div>

    <div class="form-group" id="customModelGroup">
      <label for="customModel">自定义模型</label>
      <input type="text" id="customModel" placeholder="输入模型名，如 mimo-v2.5" autocomplete="off">
      <span class="help-text">当套餐提供专用模型名时，在这里填写</span>
    </div>

    <div class="form-group" id="baseUrlGroup">
      <label for="baseUrl">Base URL</label>
      <input type="text" id="baseUrl" placeholder="可选，如 https://api.example.com/v1" autocomplete="off">
      <span class="help-text">留空使用默认地址；填写 Base URL 会自动补全 /chat/completions</span>
    </div>

    <div class="form-group">
      <label for="apiKey" id="apiKeyLabel">API Key</label>
      <div class="input-container">
        <input type="password" id="apiKey" placeholder="输入 API Key" autocomplete="off">
        <button id="toggleBtn" class="icon-btn" title="显示/隐藏">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
      <span class="help-text" id="helpText"></span>
    </div>

    <div class="form-group">
      <label for="promptStyle">翻译风格</label>
      <select id="promptStyle">
        <option value="reddit">Reddit 社区口语 (地道、融入社区语气)</option>
        <option value="twitter">Twitter/X 社交推文 (精炼、口语化、有网感)</option>
        <option value="hackernews">Hacker News 极客口吻 (理性客观、技术范)</option>
        <option value="github">GitHub 协作 (协作/专业、适合 PR & Issue)</option>
        <option value="discord">Discord/Slack 聊天 (极简、口语、缩略语)</option>
        <option value="direct">直译 (准确、中立)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="hotkey">翻译快捷键</label>
      <div class="hotkey-display">
        <span class="hotkey-item"><kbd>Alt</kbd> + <kbd>Q</kbd></span>
        <span class="hotkey-divider"></span>
        <span class="hotkey-item"><kbd>⌥</kbd> + <kbd>Q</kbd></span>
      </div>
    </div>

    <div class="button-group">
      <button id="testBtn" class="btn btn-secondary">测试连接</button>
      <button id="saveBtn" class="btn btn-secondary">保存配置</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
